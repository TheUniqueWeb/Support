<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Bot Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="card w-full max-w-sm p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Send Message</h2>
        
        <div class="space-y-4">
            <textarea id="msg" rows="4" 
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" 
                placeholder="Write your message..."></textarea>

            <button id="send" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all active:scale-95">
                SEND NOW
            </button>
        </div>

        <p id="status" class="mt-3 text-center text-sm font-semibold hidden"></p>
    </div>

    <script>
        const token = '8272772421:AAESSq6Ela6QuT8gkUdGDLOzFnCSHsWcYkQ';
        const adminId = '7136887795';

        const btn = document.getElementById('send');
        const input = document.getElementById('msg');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) return;

            // UI feedback
            btn.disabled = true;
            btn.innerText = "Sending...";
            
            try {
                // Direct API call (Fastest way)
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: adminId,
                        text: text // No extra text added here
                    })
                });

                if (res.ok) {
                    showStatus('✅ Sent Successfully!', 'text-green-600');
                    input.value = '';
                } else {
                    showStatus('❌ Error!', 'text-red-600');
                }
            } catch (e) {
                showStatus('❌ Connection Error!', 'text-red-600');
            } finally {
                btn.disabled = false;
                btn.innerText = "SEND NOW";
            }
        });

        function showStatus(txt, cls) {
            status.innerText = txt;
            status.className = `mt-3 text-center text-sm font-semibold ${cls}`;
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 2000);
        }
    </script>
</body>
</html>
